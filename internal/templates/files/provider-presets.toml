[[presets]]
slug = "deepseek"
name = "DeepSeek"

  [[presets.url_options]]
  slug = "deepseek"
  label = "OpenAI-compatible"
  base_url = "https://api.deepseek.com/v1"
  api_protocol = "openai_chat"
  default_model = "deepseek-v4-flash"
  endpoints = { chat_completions = "/chat/completions", models = "/models" }

[[presets]]
slug = "kimi"
name = "Kimi / Moonshot"

  [[presets.url_options]]
  slug = "openai"
  label = "OpenAI-compatible"
  base_url = "https://api.moonshot.cn/v1"
  api_protocol = "openai_chat"
  default_model = "kimi-latest"
  endpoints = { chat_completions = "/chat_completions", models = "/models" }

  [[presets.url_options]]
  slug = "claude"
  label = "Claude Code-compatible"
  base_url = "https://api.moonshot.cn/anthropic"
  api_protocol = "anthropic"
  default_model = "kimi-latest"
  endpoints = { messages = "/v1/messages", models = "/v1/models" }

[[presets]]
slug = "minimax"
name = "MiniMax"

  [[presets.url_options]]
  slug = "openai"
  label = "OpenAI-compatible"
  base_url = "https://api.minimaxi.com/v1"
  api_protocol = "openai_chat"
  default_model = "MiniMax-M3"
  endpoints = { chat_completions = "/chat/completions", models = "/models" }

  [[presets.url_options]]
  slug = "claude"
  label = "Claude Code-compatible"
  base_url = "https://api.minimaxi.com/anthropic"
  api_protocol = "anthropic"
  default_model = "MiniMax-M3"
  endpoints = { messages = "/v1/messages", models = "/v1/models" }
  capabilities = { claude_extra_env = { API_TIMEOUT_MS = "3000000", CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1", CLAUDE_CODE_AUTO_COMPACT_WINDOW = "512000" } }

  [[presets.url_options]]
  slug = "codex"
  label = "Codex-compatible"
  base_url = "https://api.minimaxi.com/v1"
  api_protocol = "openai_responses"
  default_model = "MiniMax-M3"
  endpoints = { responses = "/responses", models = "/models" }
  capabilities = { codex_auth_mode = "experimental_bearer_token", codex_model_context_window = 512000 }

[[presets]]
slug = "openai"
name = "OpenAI"

  [[presets.url_options]]
  slug = "openai"
  label = "OpenAI-compatible"
  base_url = "https://api.openai.com/v1"
  api_protocol = "openai_chat"
  default_model = "gpt-4o"
  endpoints = { chat_completions = "/chat_completions", responses = "/responses", models = "/models" }

