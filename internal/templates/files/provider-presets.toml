[[presets]]
slug = "deepseek"
name = "DeepSeek"

  [[presets.url_options]]
  slug = "deepseek"
  label = "OpenAI-compatible"
  base_url = "https://api.deepseek.com/v1"
  api_protocol = "openai_chat"
  default_model = "deepseek-v4-flash"
  endpoints = { chat_completions = "/chat/completions", models = "/models" }

