  base_url = "https://api.moonshot.cn/v1"
  api_protocol = "openai_chat"
  default_model = "moonshot-v1-8k"
  endpoints = { chat_completions = "/chat/completions", models = "/models" }

[[presets]]
slug = "openai"
name = "OpenAI"

  [[presets.url_options]]
