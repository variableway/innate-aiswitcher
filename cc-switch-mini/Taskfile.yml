# Taskfile for cc-switch-mini
#
# Builds both Rust and Go minimal implementations of CC Switch.
# Usage: task build-rust | task build-go | task build-all

version: "3"

vars:
  RUST_DIR: "rust-cc-switch-mini"
  GO_DIR: "go-cc-switch-mini"

tasks:
  build-rust:
    desc: Build the Rust implementation
    dir: "{{.RUST_DIR}}"
    cmds:
      - cargo build --release

  build-go:
    desc: Build the Go implementation
    dir: "{{.GO_DIR}}"
    cmds:
      - mkdir -p bin
      - go build -o bin/cc-switch-mini-go .

  build-all:
    desc: Build both Rust and Go implementations
    cmds:
      - task: build-rust
      - task: build-go

  clean:
    desc: Clean all build artifacts
    cmds:
      - rm -rf bin/
      - cd {{.RUST_DIR}} && cargo clean

  run-rust:
    desc: Run the Rust implementation
    dir: "{{.RUST_DIR}}"
    cmds:
      - cargo run --release

  run-go:
    desc: Run the Go implementation
    dir: "{{.GO_DIR}}"
    cmds:
      - go run .
